version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mindflow
      MYSQL_USER: mindflow
      MYSQL_PASSWORD: mindflow_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    networks:
      - mindflow

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 10
    networks:
      - mindflow

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://mindflow:mindflow_password@mysql:3306/mindflow
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key
      PORT: 3001
      LOG_LEVEL: debug
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/.env:/app/.env
    command: pnpm run dev
    networks:
      - mindflow

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/.env:/app/.env
    command: pnpm run dev
    depends_on:
      - backend
    networks:
      - mindflow

volumes:
  mysql_data:
  redis_data:

networks:
  mindflow:
    driver: bridge
